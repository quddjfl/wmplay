<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WM 놀이</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* 커스텀 스크롤바 */
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 10px;
    }
    /* 간단한 애니메이션 효과 */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInDown { from { opacity: 0; transform: translate(-50%, -20px); } to { opacity: 1; transform: translate(-50%, 0); } }
    @keyframes slideInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    
    .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    .animate-slide-down { animation: slideInDown 0.3s ease-out forwards; }
    .animate-slide-up { animation: slideInUp 0.5s ease-out forwards; }
    .animate-zoom-in { animation: zoomIn 0.3s ease-out forwards; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 font-sans p-4 md:p-8">
  <div id="app" class="max-w-4xl mx-auto relative"></div>

  <script>
    // --- 상태 관리 (State) ---
    const state = {
      phase: 'setup', // 'setup', 'playing', 'ended'
      numGroups: 4,
      targetScore: 30,
      round: 1,
      scores: [],
      currentChoices: {},
      history: [],
      showRules: false,
      achievedRound: null,
      warning: '',
      warningTimeout: null
    };

    // --- 비즈니스 로직 (Actions) ---
    function showWarning(msg) {
      state.warning = msg;
      render();
      if (state.warningTimeout) clearTimeout(state.warningTimeout);
      state.warningTimeout = setTimeout(() => {
        state.warning = '';
        render();
      }, 3000);
    }

    function handleStartGame() {
      if (state.numGroups < 2) return;
      state.scores = Array.from({ length: state.numGroups }, (_, i) => ({
        id: i + 1,
        total: 0
      }));
      state.phase = 'playing';
      state.round = 1;
      state.history = [];
      state.currentChoices = {};
      state.achievedRound = null;
      render();
    }

    function handleSelect(groupId, choice) {
      state.currentChoices[groupId] = choice;
      render();
    }

    function handleNextRound() {
      const choices = Object.values(state.currentChoices);
      
      if (choices.length < state.numGroups) {
        showWarning("모든 모둠의 선택을 완료해 주세요.");
        return;
      }

      const allW = choices.every(c => c === 'W');
      const allM = choices.every(c => c === 'M');
      
      let roundResults = {};
      
      if (allW) {
        state.scores.forEach(s => { roundResults[s.id] = 3; });
      } else if (allM) {
        state.scores.forEach(s => { roundResults[s.id] = -10; });
      } else {
        Object.entries(state.currentChoices).forEach(([gid, choice]) => {
          roundResults[gid] = choice === 'W' ? -5 : 5;
        });
      }

      const newScores = state.scores.map(s => ({
        ...s,
        total: s.total + roundResults[s.id]
      }));

      const isGlobalGoalMet = newScores.length > 0 && newScores.every(s => s.total >= state.targetScore);
      if (isGlobalGoalMet && state.achievedRound === null) {
        state.achievedRound = state.round;
      }

      state.scores = newScores;
      state.history.unshift({
        round: state.round,
        choices: { ...state.currentChoices },
        results: roundResults
      });
      
      state.round += 1;
      state.currentChoices = {};
      render();
    }

    function handleEndGame() {
      state.phase = 'ended';
      state.showRules = false;
      render();
    }

    function handleReset() {
      state.phase = 'setup';
      state.showRules = false;
      state.achievedRound = null;
      render();
    }

    function toggleRules() {
      state.showRules = !state.showRules;
      render();
    }

    // Input 상태 업데이트 로직 (리렌더링 방지용)
    function updateSetupState(key, value) {
      const parsed = parseInt(value) || 0;
      state[key] = parsed;
      if (key === 'numGroups') {
        const btn = document.getElementById('startBtn');
        if (btn) btn.disabled = parsed < 2;
      }
    }

    // --- UI 렌더링 (View) ---
    function render() {
      const app = document.getElementById('app');
      const isGlobalGoalCurrentlyMet = state.scores.length > 0 && state.scores.every(s => s.total >= state.targetScore);

      let html = `
        ${state.warning ? `
          <div class="fixed top-4 left-1/2 z-50 animate-slide-down">
            <div class="bg-rose-600 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-2 font-bold">
              <i data-lucide="alert-circle" class="w-5 h-5"></i>
              ${state.warning}
            </div>
          </div>
        ` : ''}

        <header class="text-center mb-8">
          <h1 class="text-4xl font-black text-indigo-600 tracking-tight mb-2">WM 놀이</h1>
          <p class="text-slate-500 font-medium italic">어떤 선택이 팀에게 가장 유리할까요?</p>
        </header>
      `;

      if (state.phase === 'setup') {
        html += `
          <div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-200 animate-zoom-in">
            <div class="flex items-center gap-3 mb-6">
              <i data-lucide="users" class="text-indigo-500 w-7 h-7"></i>
              <h2 class="text-2xl font-bold">참여 설정</h2>
            </div>
            
            <div class="space-y-8">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                  <label class="block text-sm font-bold text-slate-700 mb-2">모둠 수 입력</label>
                  <div class="flex items-center gap-4">
                    <input 
                      type="number" min="2" max="12" value="${state.numGroups}"
                      oninput="updateSetupState('numGroups', this.value)"
                      class="w-full bg-slate-100 border-2 border-slate-200 rounded-2xl px-6 py-4 text-xl font-bold focus:border-indigo-500 outline-none transition-all"
                    />
                    <span class="text-lg font-bold text-slate-500 shrink-0">개 모둠</span>
                  </div>
                </div>

                <div>
                  <label class="flex items-center gap-2 text-sm font-bold text-slate-700 mb-2">
                    <i data-lucide="target" class="text-rose-500 w-4 h-4"></i> 목표 점수 설정
                  </label>
                  <div class="flex items-center gap-4">
                    <input 
                      type="number" value="${state.targetScore}"
                      oninput="updateSetupState('targetScore', this.value)"
                      class="w-full bg-slate-100 border-2 border-slate-200 rounded-2xl px-6 py-4 text-xl font-bold focus:border-rose-500 outline-none transition-all"
                    />
                    <span class="text-lg font-bold text-slate-500 shrink-0">점</span>
                  </div>
                </div>
              </div>

              <button 
                id="startBtn"
                onclick="handleStartGame()"
                ${state.numGroups < 2 ? 'disabled' : ''}
                class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-black py-5 rounded-2xl text-xl shadow-lg transition-all flex items-center justify-center gap-2"
              >
                <i data-lucide="play" class="w-5 h-5 fill-current"></i>
                놀이 시작
              </button>
            </div>
          </div>
        `;
      } 
      
      else if (state.phase === 'playing') {
        html += `
          <div class="space-y-8 animate-fade-in">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
              
              <div class="lg:col-span-2 space-y-6">
                <div class="bg-white rounded-3xl shadow-lg border border-slate-200 overflow-hidden">
                  <div class="bg-indigo-600 p-6 text-white flex justify-between items-center">
                    <h2 class="text-xl font-bold flex items-center gap-2">
                      <i data-lucide="chevron-right" class="w-5 h-5"></i> ${state.round}회차 선택
                    </h2>
                    <div class="bg-rose-500/20 px-4 py-1.5 rounded-full border border-rose-400/30 flex items-center gap-2">
                      <i data-lucide="target" class="text-rose-300 w-3.5 h-3.5"></i>
                      <span class="text-xs font-bold tracking-tight">목표: ${state.targetScore}점</span>
                    </div>
                  </div>
                  
                  <div class="p-6 space-y-4">
                    ${state.scores.map(group => `
                      <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <span class="font-bold text-lg">${group.id}모둠</span>
                        <div class="flex gap-2">
                          <button 
                            onclick="handleSelect(${group.id}, 'W')"
                            class="w-16 h-16 rounded-xl font-black text-2xl transition-all shadow-sm 
                            ${state.currentChoices[group.id] === 'W' 
                              ? 'bg-indigo-600 text-white scale-110 shadow-indigo-200' 
                              : 'bg-white text-slate-300 border border-slate-200 hover:border-indigo-300'}"
                          >W</button>
                          <button 
                            onclick="handleSelect(${group.id}, 'M')"
                            class="w-16 h-16 rounded-xl font-black text-2xl transition-all shadow-sm 
                            ${state.currentChoices[group.id] === 'M' 
                              ? 'bg-rose-500 text-white scale-110 shadow-rose-200' 
                              : 'bg-white text-slate-300 border border-slate-200 hover:border-rose-300'}"
                          >M</button>
                        </div>
                      </div>
                    `).join('')}
                  </div>

                  <div class="p-6 bg-slate-50 border-t border-slate-100 flex gap-3">
                    <button 
                      onclick="handleNextRound()"
                      class="flex-1 bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-2"
                    >
                      <i data-lucide="check-circle-2" class="w-4 h-4"></i> 점수 확인 및 다음 회차
                    </button>
                    <button 
                      onclick="handleEndGame()"
                      class="bg-white border-2 border-slate-200 hover:bg-slate-100 text-slate-600 font-bold px-6 py-4 rounded-2xl transition-all"
                    >
                      놀이 종료
                    </button>
                  </div>
                </div>

                <div class="bg-white rounded-3xl shadow-lg border border-slate-200 p-6">
                  <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i data-lucide="trophy" class="text-amber-500 w-5 h-5"></i> 실시간 누적 점수
                  </h3>
                  <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                    ${state.scores.map(s => {
                      const isTargetMet = s.total >= state.targetScore;
                      return `
                        <div class="p-4 rounded-2xl border transition-all ${isTargetMet ? 'bg-emerald-50 border-emerald-200' : 'bg-slate-50 border-slate-100'}">
                          <div class="flex justify-between items-start mb-1">
                            <p class="text-xs font-bold ${isTargetMet ? 'text-emerald-600' : 'text-slate-400'}">${s.id}모둠</p>
                            ${isTargetMet ? `<i data-lucide="check-circle-2" class="text-emerald-500 w-3.5 h-3.5"></i>` : ''}
                          </div>
                          <p class="text-2xl font-black ${s.total >= 0 ? (isTargetMet ? 'text-emerald-600' : 'text-indigo-600') : 'text-rose-500'}">
                            ${s.total > 0 ? `+${s.total}` : s.total}
                          </p>
                        </div>
                      `;
                    }).join('')}
                  </div>
                </div>
              </div>

              <div class="space-y-6">
                <div class="bg-slate-900 rounded-3xl shadow-lg p-6 h-[500px] flex flex-col">
                  <h3 class="text-white font-bold mb-4 flex items-center gap-2">
                    <i data-lucide="history" class="text-indigo-400 w-4 h-4"></i> 라운드 기록
                  </h3>
                  <div class="flex-1 overflow-y-auto space-y-3 pr-2 custom-scrollbar">
                    ${state.history.map(h => `
                      <div class="bg-white/10 rounded-xl p-3 text-xs border border-white/5">
                        <div class="flex justify-between text-indigo-300 font-bold mb-2">
                          <span>${h.round}회차</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                          ${Object.entries(h.choices).map(([gid, choice]) => `
                            <div class="flex justify-between items-center text-slate-400">
                              <span>${gid}모둠: <span class="${choice === 'W' ? 'text-indigo-400' : 'text-rose-400'}">${choice}</span></span>
                              <span class="${h.results[gid] >= 0 ? 'text-emerald-400' : 'text-rose-400'}">
                                ${h.results[gid] > 0 ? `+${h.results[gid]}` : h.results[gid]}
                              </span>
                            </div>
                          `).join('')}
                        </div>
                      </div>
                    `).join('')}
                  </div>
                </div>
              </div>

            </div>
          </div>
        `;
      } 
      
      else if (state.phase === 'ended') {
        html += `
          <div class="animate-slide-up">
            <div class="bg-white rounded-3xl shadow-2xl p-8 border border-slate-200 text-center relative overflow-hidden">
              <div class="absolute top-0 left-0 w-full h-2 bg-indigo-600"></div>
              
              <div class="mb-6 relative inline-block">
                <i data-lucide="trophy" class="mx-auto text-amber-500 w-16 h-16"></i>
                ${isGlobalGoalCurrentlyMet ? `
                  <div class="absolute -top-2 -right-6 bg-emerald-500 text-white text-[10px] font-black px-2 py-1 rounded-full animate-bounce">
                    GOAL CLEAR!
                  </div>
                ` : ''}
              </div>
              
              <h2 class="text-3xl font-black mb-2">최종 결과</h2>
              <div class="flex flex-col items-center gap-2 mb-8">
                <p class="text-slate-500 font-medium">목표 점수 <span class="text-rose-600 font-bold">${state.targetScore}점</span> 달성 현황</p>
                ${state.achievedRound ? `
                  <div class="bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-full text-sm font-black flex items-center gap-2 border border-emerald-200">
                    <i data-lucide="check-circle-2" class="w-4 h-4"></i>
                    ${state.achievedRound}회차 만에 전체 목표 달성!
                  </div>
                ` : `
                  <div class="bg-slate-100 text-slate-500 px-4 py-1.5 rounded-full text-sm font-bold border border-slate-200">
                    전체 목표 달성 실패
                  </div>
                `}
              </div>

              <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                ${state.scores.map(s => {
                  const met = s.total >= state.targetScore;
                  return `
                    <div class="p-6 rounded-2xl border-2 transition-all ${met ? 'bg-emerald-50 border-emerald-200 shadow-sm' : 'bg-slate-50 border-slate-100'}">
                      <p class="font-bold text-sm mb-2 ${met ? 'text-emerald-600' : 'text-slate-400'}">${s.id}모둠</p>
                      <p class="text-3xl font-black ${s.total >= state.targetScore ? 'text-emerald-600' : (s.total >= 0 ? 'text-indigo-600' : 'text-rose-500')}">
                        ${s.total}
                      </p>
                    </div>
                  `;
                }).join('')}
              </div>

              <div class="mb-8 p-6 rounded-2xl flex flex-col items-center gap-3 border-2 ${isGlobalGoalCurrentlyMet ? 'bg-emerald-600 text-white border-emerald-500 shadow-lg shadow-emerald-200' : 'bg-slate-100 border-slate-200 text-slate-600'}">
                ${isGlobalGoalCurrentlyMet ? `
                  <i data-lucide="flag" class="text-white w-8 h-8"></i>
                  <p class="font-black text-xl">축하합니다! 모든 모둠이 함께 목표를 이루었습니다!</p>
                ` : `
                  <i data-lucide="alert-circle" class="text-slate-400 w-8 h-8"></i>
                  <p class="font-black text-xl text-slate
